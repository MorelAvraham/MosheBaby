<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#fffdf7"/>
      <stop offset="100%" stop-color="#fef0e4"/>
    </radialGradient>
    <radialGradient id="faceGrad" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#ffe4c4"/>
      <stop offset="100%" stop-color="#f5c89a"/>
    </radialGradient>
    <radialGradient id="cheekGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffb3a0" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ffb3a0" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="110" ry="110" fill="url(#bgGrad)"/>

  <!-- Sun rays behind head -->
  <g transform="translate(256,198)" fill="#f5c842" opacity="0.85">
    <ellipse cx="0" cy="-118" rx="9" ry="28" transform="rotate(0)"/>
    <ellipse cx="0" cy="-118" rx="9" ry="28" transform="rotate(30)"/>
    <ellipse cx="0" cy="-118" rx="9" ry="28" transform="rotate(60)"/>
    <ellipse cx="0" cy="-118" rx="9" ry="28" transform="rotate(90)"/>
    <ellipse cx="0" cy="-118" rx="9" ry="28" transform="rotate(120)"/>
    <ellipse cx="0" cy="-118" rx="9" ry="28" transform="rotate(150)"/>
    <ellipse cx="0" cy="-118" rx="9" ry="28" transform="rotate(180)"/>
    <ellipse cx="0" cy="-118" rx="9" ry="28" transform="rotate(210)"/>
    <ellipse cx="0" cy="-118" rx="9" ry="28" transform="rotate(240)"/>
    <ellipse cx="0" cy="-118" rx="9" ry="28" transform="rotate(270)"/>
    <ellipse cx="0" cy="-118" rx="9" ry="28" transform="rotate(300)"/>
    <ellipse cx="0" cy="-118" rx="9" ry="28" transform="rotate(330)"/>
  </g>

  <!-- Sunflower petals ring -->
  <g transform="translate(256,198)" fill="#f5c842">
    <ellipse cx="0" cy="-96" rx="16" ry="34" transform="rotate(0)"/>
    <ellipse cx="0" cy="-96" rx="16" ry="34" transform="rotate(22.5)"/>
    <ellipse cx="0" cy="-96" rx="16" ry="34" transform="rotate(45)"/>
    <ellipse cx="0" cy="-96" rx="16" ry="34" transform="rotate(67.5)"/>
    <ellipse cx="0" cy="-96" rx="16" ry="34" transform="rotate(90)"/>
    <ellipse cx="0" cy="-96" rx="16" ry="34" transform="rotate(112.5)"/>
    <ellipse cx="0" cy="-96" rx="16" ry="34" transform="rotate(135)"/>
    <ellipse cx="0" cy="-96" rx="16" ry="34" transform="rotate(157.5)"/>
    <ellipse cx="0" cy="-96" rx="16" ry="34" transform="rotate(180)"/>
    <ellipse cx="0" cy="-96" rx="16" ry="34" transform="rotate(202.5)"/>
    <ellipse cx="0" cy="-96" rx="16" ry="34" transform="rotate(225)"/>
    <ellipse cx="0" cy="-96" rx="16" ry="34" transform="rotate(247.5)"/>
    <ellipse cx="0" cy="-96" rx="16" ry="34" transform="rotate(270)"/>
    <ellipse cx="0" cy="-96" rx="16" ry="34" transform="rotate(292.5)"/>
    <ellipse cx="0" cy="-96" rx="16" ry="34" transform="rotate(315)"/>
    <ellipse cx="0" cy="-96" rx="16" ry="34" transform="rotate(337.5)"/>
  </g>

  <!-- Petal inner ring (darker) -->
  <g transform="translate(256,198)" fill="#e6a800" opacity="0.6">
    <ellipse cx="0" cy="-74" rx="11" ry="20" transform="rotate(11.25)"/>
    <ellipse cx="0" cy="-74" rx="11" ry="20" transform="rotate(33.75)"/>
    <ellipse cx="0" cy="-74" rx="11" ry="20" transform="rotate(56.25)"/>
    <ellipse cx="0" cy="-74" rx="11" ry="20" transform="rotate(78.75)"/>
    <ellipse cx="0" cy="-74" rx="11" ry="20" transform="rotate(101.25)"/>
    <ellipse cx="0" cy="-74" rx="11" ry="20" transform="rotate(123.75)"/>
    <ellipse cx="0" cy="-74" rx="11" ry="20" transform="rotate(146.25)"/>
    <ellipse cx="0" cy="-74" rx="11" ry="20" transform="rotate(168.75)"/>
    <ellipse cx="0" cy="-74" rx="11" ry="20" transform="rotate(191.25)"/>
    <ellipse cx="0" cy="-74" rx="11" ry="20" transform="rotate(213.75)"/>
    <ellipse cx="0" cy="-74" rx="11" ry="20" transform="rotate(236.25)"/>
    <ellipse cx="0" cy="-74" rx="11" ry="20" transform="rotate(258.75)"/>
    <ellipse cx="0" cy="-74" rx="11" ry="20" transform="rotate(281.25)"/>
    <ellipse cx="0" cy="-74" rx="11" ry="20" transform="rotate(303.75)"/>
    <ellipse cx="0" cy="-74" rx="11" ry="20" transform="rotate(326.25)"/>
    <ellipse cx="0" cy="-74" rx="11" ry="20" transform="rotate(348.75)"/>
  </g>

  <!-- Brown sunflower center -->
  <circle cx="256" cy="198" r="58" fill="#7a4f1e"/>
  <circle cx="256" cy="198" r="50" fill="#9b6027"/>

  <!-- Baby face -->
  <ellipse cx="256" cy="240" rx="90" ry="100" fill="url(#faceGrad)"/>

  <!-- Ears -->
  <ellipse cx="168" cy="248" rx="18" ry="22" fill="#f5c89a"/>
  <ellipse cx="344" cy="248" rx="18" ry="22" fill="#f5c89a"/>
  <ellipse cx="168" cy="248" rx="10" ry="13" fill="#e8a87c"/>
  <ellipse cx="344" cy="248" rx="10" ry="13" fill="#e8a87c"/>

  <!-- Cheeks -->
  <ellipse cx="200" cy="270" rx="28" ry="18" fill="url(#cheekGrad)"/>
  <ellipse cx="312" cy="270" rx="28" ry="18" fill="url(#cheekGrad)"/>

  <!-- Eyes -->
  <ellipse cx="224" cy="232" rx="14" ry="16" fill="white"/>
  <ellipse cx="288" cy="232" rx="14" ry="16" fill="white"/>
  <circle cx="226" cy="234" r="9" fill="#3d2b1a"/>
  <circle cx="290" cy="234" r="9" fill="#3d2b1a"/>
  <circle cx="229" cy="231" r="3.5" fill="white"/>
  <circle cx="293" cy="231" r="3.5" fill="white"/>
  <!-- Eyelashes -->
  <path d="M211,220 Q213,213 217,210" stroke="#3d2b1a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M221,218 Q222,210 224,208" stroke="#3d2b1a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M231,220 Q233,212 237,210" stroke="#3d2b1a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M276,220 Q278,212 282,210" stroke="#3d2b1a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M286,218 Q288,210 291,208" stroke="#3d2b1a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M296,220 Q300,213 303,211" stroke="#3d2b1a" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Eyebrows -->
  <path d="M210,218 Q224,210 238,217" stroke="#8b6040" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M274,217 Q288,210 302,218" stroke="#8b6040" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Nose -->
  <ellipse cx="256" cy="258" rx="7" ry="5" fill="#e8a87c"/>
  <circle cx="251" cy="259" r="3" fill="#d4906a"/>
  <circle cx="261" cy="259" r="3" fill="#d4906a"/>

  <!-- Smile -->
  <path d="M228,278 Q256,302 284,278" stroke="#c07040" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Mouth interior -->
  <path d="M235,282 Q256,298 277,282" stroke="none" fill="#e05050" opacity="0.5"/>

  <!-- Chin dimple -->
  <path d="M252,310 Q256,315 260,310" stroke="#e8a87c" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Green leaves at bottom -->
  <g fill="#4a8c3f">
    <ellipse cx="185" cy="345" rx="40" ry="18" transform="rotate(-30,185,345)"/>
    <ellipse cx="327" cy="345" rx="40" ry="18" transform="rotate(30,327,345)"/>
    <ellipse cx="210" cy="355" rx="30" ry="14" transform="rotate(-15,210,355)"/>
    <ellipse cx="302" cy="355" rx="30" ry="14" transform="rotate(15,302,355)"/>
  </g>
  <g fill="#3a7030" opacity="0.6">
    <ellipse cx="180" cy="340" rx="22" ry="9" transform="rotate(-40,180,340)"/>
    <ellipse cx="332" cy="340" rx="22" ry="9" transform="rotate(40,332,340)"/>
  </g>

  <!-- Leaf veins -->
  <line x1="185" y1="345" x2="158" y2="335" stroke="#3a7030" stroke-width="1.5" opacity="0.7"/>
  <line x1="327" y1="345" x2="354" y2="335" stroke="#3a7030" stroke-width="1.5" opacity="0.7"/>

  <!-- Baby name "משה" -->
  <text
    x="256"
    y="430"
    font-family="'Arial', 'Helvetica', sans-serif"
    font-size="82"
    font-weight="bold"
    fill="#4a8c3f"
    text-anchor="middle"
    dominant-baseline="auto"
    direction="rtl"
    letter-spacing="-2"
  >משה</text>

  <!-- Subtle border -->
  <rect width="512" height="512" rx="110" ry="110" fill="none" stroke="#e8c9a0" stroke-width="6"/>
</svg>
