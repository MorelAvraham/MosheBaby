<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff8f0"/>
      <stop offset="100%" stop-color="#fdebd8"/>
    </radialGradient>
    <radialGradient id="face" cx="45%" cy="38%" r="60%">
      <stop offset="0%" stop-color="#ffddb8"/>
      <stop offset="100%" stop-color="#f5c090"/>
    </radialGradient>
    <radialGradient id="cheek" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffaaaa" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffaaaa" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <!-- Subtle border -->
  <rect width="512" height="512" rx="112" ry="112" fill="none"
        stroke="#f2c4a0" stroke-width="5"/>

  <!-- ── Body / onesie ── -->
  <ellipse cx="256" cy="430" rx="100" ry="60" fill="#a8d8ea"/>
  <rect x="156" y="390" width="200" height="55" rx="20" fill="#a8d8ea"/>
  <!-- collar -->
  <path d="M220,388 Q256,410 292,388" fill="#fff" stroke="#8bbdd0" stroke-width="2"/>

  <!-- ── Head ── -->
  <ellipse cx="256" cy="228" rx="118" ry="120" fill="url(#face)"/>

  <!-- ── Ears ── -->
  <ellipse cx="140" cy="238" rx="22" ry="26" fill="#f5c090"/>
  <ellipse cx="372" cy="238" rx="22" ry="26" fill="#f5c090"/>
  <!-- inner ear -->
  <ellipse cx="140" cy="238" rx="12" ry="15" fill="#f0a878"/>
  <ellipse cx="372" cy="238" rx="12" ry="15" fill="#f0a878"/>

  <!-- ── Hair tufts ── -->
  <ellipse cx="210" cy="114" rx="22" ry="30" fill="#c8860a" transform="rotate(-15,210,114)"/>
  <ellipse cx="256" cy="108" rx="22" ry="32" fill="#c8860a"/>
  <ellipse cx="302" cy="114" rx="22" ry="30" fill="#c8860a" transform="rotate(15,302,114)"/>
  <ellipse cx="175" cy="128" rx="16" ry="22" fill="#c8860a" transform="rotate(-30,175,128)"/>
  <ellipse cx="337" cy="128" rx="16" ry="22" fill="#c8860a" transform="rotate(30,337,128)"/>

  <!-- ── Eyes (big, cute, cartoon) ── -->
  <!-- whites -->
  <ellipse cx="210" cy="234" rx="28" ry="30" fill="white"/>
  <ellipse cx="302" cy="234" rx="28" ry="30" fill="white"/>
  <!-- irises -->
  <circle cx="210" cy="238" r="18" fill="#4a6fa5"/>
  <circle cx="302" cy="238" r="18" fill="#4a6fa5"/>
  <!-- pupils -->
  <circle cx="210" cy="238" r="10" fill="#1a1a2e"/>
  <circle cx="302" cy="238" r="10" fill="#1a1a2e"/>
  <!-- sparkle highlight large -->
  <circle cx="216" cy="231" r="5" fill="white"/>
  <circle cx="308" cy="231" r="5" fill="white"/>
  <!-- sparkle highlight small -->
  <circle cx="204" cy="242" r="2.5" fill="white"/>
  <circle cx="296" cy="242" r="2.5" fill="white"/>

  <!-- ── Eyebrows (cute arched) ── -->
  <path d="M186,205 Q210,193 234,205" stroke="#9b6a1a" stroke-width="5"
        fill="none" stroke-linecap="round"/>
  <path d="M278,205 Q302,193 326,205" stroke="#9b6a1a" stroke-width="5"
        fill="none" stroke-linecap="round"/>

  <!-- ── Cheeks ── -->
  <ellipse cx="175" cy="268" rx="32" ry="20" fill="url(#cheek)"/>
  <ellipse cx="337" cy="268" rx="32" ry="20" fill="url(#cheek)"/>

  <!-- ── Nose (tiny cute) ── -->
  <ellipse cx="248" cy="264" rx="5" ry="4" fill="#d4946a"/>
  <ellipse cx="264" cy="264" rx="5" ry="4" fill="#d4946a"/>

  <!-- ── Smile ── -->
  <path d="M220,288 Q256,320 292,288"
        stroke="#d4724a" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- ── Baby name ── -->
  <!-- Using individual positioned letters to guarantee RTL order: מ ש ה -->
  <text font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="900"
        fill="#d4724a" dominant-baseline="auto">
    <!-- ה left, ש middle, מ right — visual RTL: reads מ-ש-ה right to left -->
    <tspan x="178" y="490">&#x05D4;</tspan>
    <tspan x="234" y="490">&#x05E9;</tspan>
    <tspan x="294" y="490">&#x05DE;</tspan>
  </text>
</svg>
